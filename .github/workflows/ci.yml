name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          test -z "$(find cmd internal -type f -name '*.go' -print0 | xargs -0 gofmt -l)"

      - name: Run tests
        run: go test ./...
