version: 2

project_name: skills

builds:
  - id: skills
    main: ./cmd/skills
    binary: skills
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: skills
    ids:
      - skills
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: false

checksum:
  name_template: "skills_checksums.txt"

changelog:
  disable: true

release:
  github:
    owner: mattgiles
    name: skills
